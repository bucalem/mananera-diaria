name: Corpus histórico (manual)

on:
  schedule:
    # 00:00 UTC = 6:00 pm CDMX, lun-vie (30 min después del scraper de correo)
    - cron: "0 0 * * 2-6"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Solo listar URLs sin descargar"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  historico:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Scrapear corpus histórico
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python scraper_historico.py --dry-run
          else
            python scraper_historico.py
          fi

      - name: Guardar corpus en el repo
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add corpus/
          if git diff --cached --quiet; then
            echo "Sin transcripciones nuevas."
          else
            COUNT=$(git diff --cached --name-only | wc -l | tr -d ' ')
            git commit -m "Corpus histórico: ${COUNT} transcripciones"
            git push
          fi
